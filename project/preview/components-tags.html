<!doctype html>
<html><head><meta charset="utf-8"><title>Tags & badges</title><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
.pill{font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:6px 12px;border-radius:999px;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.pill-solid{background:#1B2C4F;color:#F1E9D7}
.pill-outline{border:1px solid #1B2C4F;color:#1B2C4F}
.pill-soft{background:#E7DDC6;color:#1B2C4F}
.dot{width:6px;height:6px;border-radius:999px;background:currentColor}
</style>
<div class="card">
  <div class="card-eyebrow">Tags & status — pills reserved for these only</div>
  <div class="row" style="flex-wrap:wrap;gap:8px">
    <span class="pill pill-solid"><span class="dot"></span>In stock</span>
    <span class="pill pill-outline">Last few</span>
    <span class="pill pill-soft">New for spring</span>
    <span class="pill pill-outline">Made in Portugal</span>
    <span class="pill pill-outline">Unisex</span>
    <span class="pill pill-soft">Linen blend</span>
  </div>
</div>
</body></html>
