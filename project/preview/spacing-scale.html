<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="card-eyebrow">Spacing · 8pt grid with 4pt half-steps</div>
  <div style="display:flex;align-items:flex-end;gap:8px">
    <div style="text-align:center"><div style="background:#1B2C4F;width:4px;height:4px"></div><div class="label-mono" style="margin-top:8px">4</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:8px;height:8px"></div><div class="label-mono" style="margin-top:8px">8</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:12px;height:12px"></div><div class="label-mono" style="margin-top:8px">12</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:16px;height:16px"></div><div class="label-mono" style="margin-top:8px">16</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:24px;height:24px"></div><div class="label-mono" style="margin-top:8px">24</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:32px;height:32px"></div><div class="label-mono" style="margin-top:8px">32</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:48px;height:48px"></div><div class="label-mono" style="margin-top:8px">48</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:64px;height:64px"></div><div class="label-mono" style="margin-top:8px">64</div></div>
    <div style="text-align:center"><div style="background:#1B2C4F;width:96px;height:96px"></div><div class="label-mono" style="margin-top:8px">96</div></div>
  </div>
  <div class="label-mono">Tokens: --sp-1 through --sp-10. Marketing breathes at 96–128 between sections.</div>
</div>
</body></html>
