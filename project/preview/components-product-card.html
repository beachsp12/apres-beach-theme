<!doctype html>
<html><head><meta charset="utf-8"><title>Product card</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="card-eyebrow">Product card · Image edge-to-edge, square top, metadata below</div>
  <div class="row" style="gap:16px">
    <div style="flex:1;background:#E7DDC6;border:1px solid rgba(27,44,79,.12);border-radius:2px">
      <div style="aspect-ratio:4/5;background:url('../assets/imagery/poolside-secrets.jpg') center/cover;border-radius:2px 2px 0 0"></div>
      <div style="padding:14px 16px 16px">
        <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(27,44,79,.6)">New for spring</div>
        <div style="font-size:15px;color:#1B2C4F;margin-top:6px">Linen Camp Shirt</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#1B2C4F;margin-top:4px">€185</div>
      </div>
    </div>
    <div style="flex:1;background:#E7DDC6;border:1px solid rgba(27,44,79,.12);border-radius:2px">
      <div style="aspect-ratio:4/5;background:url('../assets/imagery/sttropez.jpg') center/cover;border-radius:2px 2px 0 0"></div>
      <div style="padding:14px 16px 16px">
        <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(27,44,79,.6)">The Harbor edit</div>
        <div style="font-size:15px;color:#1B2C4F;margin-top:6px">Demi-Boat Trouser</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:13px;color:#1B2C4F;margin-top:4px">€240</div>
      </div>
    </div>
  </div>
</div>
</body></html>
