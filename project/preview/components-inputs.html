<!doctype html>
<html><head><meta charset="utf-8"><title>Form inputs</title><link rel="stylesheet" href="_card.css"></head>
<body>
<style>
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(27,44,79,.6);font-weight:500}
.field input,.field select{font-family:inherit;font-size:15px;color:#1B2C4F;background:#E7DDC6;border:1px solid rgba(27,44,79,.12);border-radius:2px;padding:14px 16px;outline:none}
.field input:focus{border-color:#1B2C4F;box-shadow:0 0 0 2px #F1E9D7,0 0 0 4px #1B2C4F}
.field .help{font-size:12px;color:rgba(27,44,79,.6)}
</style>
<div class="card">
  <div class="card-eyebrow">Form inputs · Sand-deep wells, navy text</div>
  <div class="row" style="gap:16px">
    <div class="field" style="flex:1">
      <label>Email</label>
      <input value="anais@example.com">
    </div>
    <div class="field" style="flex:1">
      <label>Size</label>
      <select><option>Medium</option></select>
    </div>
  </div>
  <div class="field">
    <label>Postal code</label>
    <input placeholder="75001">
    <div class="help">We ship from Lisbon. Allow 4–6 working days within Europe.</div>
  </div>
</div>
</body></html>
