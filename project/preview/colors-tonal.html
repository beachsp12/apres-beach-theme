<!doctype html>
<html><head><meta charset="utf-8"><title>Tonal scales</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="card-eyebrow">Tonal scales · Hover, active, disabled — never new hues</div>
  <div class="col" style="gap:14px">
    <div>
      <div class="label-mono" style="margin-bottom:6px">NAVY</div>
      <div class="row" style="gap:0">
        <div class="swatch" style="background:#0C1528;color:#F1E9D7;border-radius:2px 0 0 2px;border-color:transparent"><div class="name" style="font-size:10px">Pressed</div><div class="hex">#0C1528</div></div>
        <div class="swatch" style="background:#131F39;color:#F1E9D7;border-radius:0;border-color:transparent"><div class="name" style="font-size:10px">Deep</div><div class="hex">#131F39</div></div>
        <div class="swatch" style="background:#1B2C4F;color:#F1E9D7;border-radius:0;border-color:transparent"><div class="name" style="font-size:10px">Base</div><div class="hex">#1B2C4F</div></div>
        <div class="swatch" style="background:#2A3D62;color:#F1E9D7;border-radius:0 2px 2px 0;border-color:transparent"><div class="name" style="font-size:10px">Soft</div><div class="hex">#2A3D62</div></div>
      </div>
    </div>
    <div>
      <div class="label-mono" style="margin-bottom:6px">SAND</div>
      <div class="row" style="gap:0">
        <div class="swatch" style="background:#F1E9D7;color:#1B2C4F;border-radius:2px 0 0 2px"><div class="name" style="font-size:10px">Base</div><div class="hex">#F1E9D7</div></div>
        <div class="swatch" style="background:#E7DDC6;color:#1B2C4F;border-radius:0"><div class="name" style="font-size:10px">Soft</div><div class="hex">#E7DDC6</div></div>
        <div class="swatch" style="background:#DCD0B4;color:#1B2C4F;border-radius:0 2px 2px 0"><div class="name" style="font-size:10px">Deep</div><div class="hex">#DCD0B4</div></div>
      </div>
    </div>
  </div>
</div>
</body></html>
