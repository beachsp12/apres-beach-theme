<!doctype html>
<html><head><meta charset="utf-8"><title>Core palette</title><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="card-eyebrow">The two-color rule · Navy and sand do every job</div>
  <div class="row">
    <div class="swatch" style="background:#1B2C4F;color:#F1E9D7;border-color:transparent;min-height:140px">
      <div class="name">Navy</div>
      <div>
        <div class="hex">#1B2C4F</div>
        <div class="hex" style="opacity:0.6">PMS 289 C · Madeira 1043</div>
      </div>
    </div>
    <div class="swatch" style="background:#F1E9D7;color:#1B2C4F;min-height:140px">
      <div class="name">Sand</div>
      <div>
        <div class="hex">#F1E9D7</div>
        <div class="hex" style="opacity:0.6">Unbleached linen, warm bias</div>
      </div>
    </div>
  </div>
  <div class="label-mono">Contrast 11.4:1 — clears WCAG AA both directions. Never #000, never #FFF.</div>
</div>
</body></html>
