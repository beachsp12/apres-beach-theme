<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Après Beach — Mobile App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: #1B2C4F; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="MobileApp.jsx"></script>

<script type="text/babel">
const { useState } = React;

const PRODUCTS = [
  { image: '../../assets/imagery/poolside-secrets.jpg', eyebrow: 'New for spring', name: 'Linen Camp Shirt', price: '€185', description: 'Linen, washed three times before it gets to you. Cut for the 5pm light — collar that holds, sleeve that breathes.' },
  { image: '../../assets/imagery/sttropez.jpg', eyebrow: 'The Harbor edit', name: 'Demi-Boat Trouser', price: '€240' },
  { image: '../../assets/imagery/colourful-crew.jpg', eyebrow: 'Knitwear', name: 'Maritime Polo', price: '€165' },
  { image: '../../assets/imagery/kaufmann-desert-house.jpg', eyebrow: 'Swim', name: 'Pavilion Swim Brief', price: '€95' },
  { image: '../../assets/imagery/palm-beach-society.jpg', eyebrow: 'Accessories', name: 'Sun Boater Hat', price: '€140' },
  { image: '../../assets/imagery/desert-house-party.jpg', eyebrow: 'Knitwear', name: 'Cardigan, off-white', price: '€295' },
];

function App() {
  const [tab, setTab] = useState('shop');
  const [view, setView] = useState('tab'); // tab | pdp
  const [product, setProduct] = useState(null);
  const [bag, setBag] = useState([
    { ...PRODUCTS[0], size: 'M' },
    { ...PRODUCTS[3], size: 'M' },
  ]);

  function openProduct(p) {
    setProduct(p);
    setView('pdp');
  }

  function addToBag(p) {
    setBag([...bag, p]);
    setView('tab');
    setTab('bag');
  }

  return (
    <IOSDevice>
      <IOSStatusBar />
      <div style={{ position: 'absolute', inset: 0, background: '#F1E9D7', overflow: 'hidden', paddingTop: 47 }}>
        <div style={{ position: 'absolute', inset: 0, paddingTop: 47, overflowY: 'auto' }}>
          {view === 'pdp' && product
            ? <MobilePDP product={product} onBack={() => setView('tab')} onAddToBag={addToBag} />
            : (
              <>
                {tab === 'shop' && <MobileShop products={PRODUCTS} onProduct={openProduct} />}
                {tab === 'lookbook' && <div style={{ height: 'calc(100% - 80px)', position: 'absolute', inset: '47px 0 80px' }}><MobileLookbook /></div>}
                {tab === 'bag' && <MobileBag items={bag} onRemove={(i) => setBag(bag.filter((_, idx) => idx !== i))} onCheckout={() => alert('Checkout (mock)')} />}
                {tab === 'account' && <MobileAccount />}
              </>
            )
          }
        </div>
        {view !== 'pdp' && <MobileTabBar tab={tab} onTab={setTab} />}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
